services:
  mqtt:
    image: eclipse-mosquitto:2
    container_name: remko-local-mqtt
    ports:
      - "${MQTT_PORT:-1883}:1883"
    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
    restart: unless-stopped

  remko-addon:
    build:
      context: ../remko_smartweb_mqtt
      args:
        BUILD_VERSION: local
        BUILD_ARCH: ${BUILD_ARCH:-amd64}
    image: remko-smartweb-mqtt:local
    container_name: remko-local-addon
    depends_on:
      - mqtt
    volumes:
      - ./data:/data:ro
    restart: unless-stopped
