name: REMKO SmartWeb MQTT
version: "0.3.4"
slug: remko_smartweb_mqtt
description: Poll REMKO SmartWeb and expose heat pump data and commands through MQTT.
arch:
  - aarch64
  - amd64
startup: application
boot: auto
init: false
homeassistant_api: true
hassio_api: true
hassio_role: default
services:
  - mqtt:want
map:
  - app_config:rw
options:
  remko:
    device_url: ""
    credentials_file: /config/credentials.json
    username: ""
    password: ""
  mqtt: {}
  controls: {}
  selectors: {}
schema:
  remko:
    base_url: str?
    overview_url: str?
    device_url: str
    credentials_file: str
    username: str
    password: password
    device_name: str?
    poll_interval_minutes: int?
    request_timeout_seconds: int?
    live_value_timeout_seconds: int?
    live_value_check_interval_seconds: int?
    ignore_zero_temperatures: bool?
    mode_set_attempts: int?
    mode_set_retry_seconds: int?
    command_cooldown_seconds: int?
    power_on_mode: str?
    homeassistant_log: bool?
    homeassistant_log_logger: str?
    homeassistant_notification: bool?
    homeassistant_notification_id: str?
  mqtt:
    host: str?
    port: port?
    username: str?
    password: password?
    topic_prefix: str?
    discovery_prefix: str?
    retain_state: bool?
  controls:
    supported_modes:
      - str?
    min_temperature: float?
    max_temperature: float?
    temperature_step: float?
  selectors:
    username_input: str?
    password_input: str?
    login_button: str?
    device_link: str?
    temperature_top: str?
    temperature_bottom: str?
    target_temperature: str?
    operating_mode: str?
    status: str?
    power_state: str?
    power_on_button: str?
    power_off_button: str?
    mode_control: str?
    operating_mode_button: str?
    active_mode: str?
    target_temperature_button: str?
    timer_button: str?
    target_temperature_input: str?
    save_button: str?
stage: experimental
