name: REMKO SmartWeb MQTT
version: "0.2.5"
slug: remko_smartweb_mqtt
description: Poll REMKO SmartWeb and expose heat pump data and commands through MQTT.
arch:
  - aarch64
  - amd64
startup: application
boot: auto
init: false
homeassistant_api: true
hassio_api: true
hassio_role: default
services:
  - mqtt:want
map:
  - addon_config:rw
options:
  remko:
    base_url: https://smartweb.remko.media/
    overview_url: https://smartweb.remko.media/liste
    device_url: ""
    credentials_file: /config/credentials.json
    username: ""
    password: ""
    device_name: WIFI Stick - Warmwasserwärmepumpe
    poll_interval_minutes: 15
    request_timeout_seconds: 90
    live_value_timeout_seconds: 300
    live_value_check_interval_seconds: 10
    ignore_zero_temperatures: true
    mode_set_attempts: 3
    mode_set_retry_seconds: 20
    power_on_mode: Automatic
    homeassistant_log: true
    homeassistant_log_logger: remko_smartweb_mqtt
    homeassistant_notification: true
    homeassistant_notification_id: remko_smartweb_mqtt_unavailable
  mqtt:
    host: auto
    port: 1883
    username: ""
    password: ""
    topic_prefix: remko
    discovery_prefix: homeassistant
    retain_state: false
  controls:
    supported_modes:
      - Off
      - Automatic
      - Eco
      - Hybrid
      - Fastheating
      - Vacation
    min_temperature: 10.0
    max_temperature: 60.0
    temperature_step: 0.5
  selectors:
    username_input: input#benutzer
    password_input: input#password
    login_button: button#login_do
    device_link: ""
    temperature_top: "#RoomValue"
    temperature_bottom: "#IndoorValue"
    target_temperature: "#ID1333_000_000_value"
    operating_mode: "#ID1192_000_000_value"
    status: ""
    power_state: ""
    power_on_button: ""
    power_off_button: ""
    mode_control: ""
    operating_mode_button: "#ID1192_000_button"
    active_mode: "#modes .mode.selected p"
    target_temperature_button: "#ID1333_000_button"
    timer_button: "#ID1404_000_button"
    target_temperature_input: ""
    save_button: ""
schema:
  remko:
    base_url: url
    overview_url: url
    device_url: str
    credentials_file: str
    username: str
    password: password
    device_name: str
    poll_interval_minutes: "int(1,1440)"
    request_timeout_seconds: "int(10,300)"
    live_value_timeout_seconds: "int(0,1800)"
    live_value_check_interval_seconds: "int(1,300)"
    ignore_zero_temperatures: bool
    mode_set_attempts: "int(1,10)"
    mode_set_retry_seconds: "int(0,300)"
    power_on_mode: str
    homeassistant_log: bool
    homeassistant_log_logger: str
    homeassistant_notification: bool
    homeassistant_notification_id: str
  mqtt:
    host: str
    port: port
    username: str
    password: password
    topic_prefix: str
    discovery_prefix: str
    retain_state: bool
  controls:
    supported_modes:
      - str
    min_temperature: float
    max_temperature: float
    temperature_step: float
  selectors:
    username_input: str
    password_input: str
    login_button: str
    device_link: str
    temperature_top: str
    temperature_bottom: str
    target_temperature: str
    operating_mode: str
    status: str
    power_state: str
    power_on_button: str
    power_off_button: str
    mode_control: str
    operating_mode_button: str
    active_mode: str
    target_temperature_button: str
    timer_button: str
    target_temperature_input: str
    save_button: str
stage: experimental
